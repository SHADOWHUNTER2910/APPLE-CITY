<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>ShelfSense — Owner Dashboard</title>
  <link href="assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/bootstrap-icons.css" rel="stylesheet">
  <style>
    body{background:#0f172a;color:#f1f5f9;font-family:'Segoe UI',sans-serif;padding-bottom:80px;}
    .top-bar{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:14px 16px;position:sticky;top:0;z-index:100;}
    .top-bar h1{font-size:17px;font-weight:700;margin:0;}
    .card-dark{background:#1e293b;border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid #334155;}
    .stat-val{font-size:18px;font-weight:800;word-break:break-all;line-height:1.2;}
    .stat-label{font-size:10px;color:#94a3b8;margin-top:2px;}
    .section-title{font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;}
    .list-item{background:#1e293b;border-radius:8px;padding:10px 12px;margin-bottom:6px;border:1px solid #334155;font-size:13px;}
    .list-item .name{font-weight:600;}
    .list-item .sub{color:#94a3b8;font-size:11px;}
    .pin-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .pin-card{background:#1e293b;border-radius:16px;padding:32px 24px;width:100%;max-width:340px;text-align:center;}
    .pin-input{background:#0f172a;border:2px solid #334155;color:white;font-size:24px;letter-spacing:8px;text-align:center;border-radius:8px;padding:12px;width:100%;}
    .pin-input:focus{border-color:#3b82f6;outline:none;}
    .btn-dark-primary{background:#3b82f6;border:none;color:white;border-radius:8px;padding:11px 20px;font-weight:600;font-size:14px;width:100%;}
    .btn-dark-success{background:#22c55e;border:none;color:white;border-radius:8px;padding:8px 14px;font-weight:600;font-size:13px;}
    .btn-dark-danger{background:#ef4444;border:none;color:white;border-radius:8px;padding:8px 14px;font-weight:600;font-size:13px;}
    .btn-dark-warning{background:#f59e0b;border:none;color:#000;border-radius:8px;padding:8px 14px;font-weight:600;font-size:13px;}
    .btn-sm-dark{background:#334155;border:none;color:#94a3b8;border-radius:6px;padding:5px 10px;font-size:12px;}
    .trend-up{color:#22c55e;} .trend-down{color:#ef4444;} .trend-flat{color:#94a3b8;}
    .badge-pill{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;}
    /* Bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex;z-index:200;}
    .bottom-nav button{flex:1;background:none;border:none;color:#64748b;padding:10px 4px;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;}
    .bottom-nav button.active{color:#3b82f6;}
    .bottom-nav button i{font-size:20px;}
    .tab-content-owner{display:none;} .tab-content-owner.active{display:block;}
    .input-dark{background:#0f172a;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:8px 12px;width:100%;font-size:13px;}
    .input-dark:focus{border-color:#3b82f6;outline:none;}
    .live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  </style>
</head>
<body>

<!-- PIN Screen -->
<div id="pin-screen" class="pin-screen">
  <div class="pin-card">
    <div style="font-size:48px;margin-bottom:12px;">🔐</div>
    <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;">Owner Dashboard</h2>
    <p style="color:#94a3b8;font-size:13px;margin-bottom:24px;">Enter your owner PIN</p>
    <input type="password" id="pin-input" class="pin-input" placeholder="••••" maxlength="8" inputmode="numeric"
           onkeydown="if(event.key==='Enter')verifyPin()">
    <div id="pin-error" style="color:#ef4444;font-size:12px;margin:8px 0;min-height:16px;"></div>
    <button class="btn-dark-primary mt-2" onclick="verifyPin()"><i class="bi bi-unlock"></i> Unlock</button>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">
  <!-- Top Bar -->
  <div class="top-bar d-flex justify-content-between align-items-center">
    <div>
      <h1><i class="bi bi-speedometer2"></i> <span id="company-name-bar">Owner Dashboard</span></h1>
      <small id="last-updated" style="font-size:10px;color:#93c5fd;"></small>
    </div>
    <button class="btn-sm-dark" onclick="loadCurrentTab()"><i class="bi bi-arrow-clockwise"></i></button>
  </div>

  <div style="padding:14px;max-width:600px;margin:0 auto;">

    <!-- ── TAB: OVERVIEW ── -->
    <div id="tab-overview" class="tab-content-owner active">
      <div class="row g-2 mb-2">
        <div class="col-6"><div class="card-dark">
          <div class="stat-label">Revenue</div>
          <div class="stat-val text-success" id="ov-revenue">GH₵0</div>
          <div id="ov-rev-trend" style="font-size:10px;margin-top:4px;"></div>
        </div></div>
        <div class="col-6"><div class="card-dark">
          <div class="stat-label">Profit</div>
          <div class="stat-val text-info" id="ov-profit">GH₵0</div>
          <div id="ov-prof-trend" style="font-size:10px;margin-top:4px;"></div>
        </div></div>
        <div class="col-4"><div class="card-dark text-center">
          <div class="stat-label">Receipts</div>
          <div class="stat-val" id="ov-receipts">0</div>
        </div></div>
        <div class="col-4"><div class="card-dark text-center">
          <div class="stat-label">Margin</div>
          <div class="stat-val text-warning" id="ov-margin">0%</div>
        </div></div>
        <div class="col-4"><div class="card-dark text-center">
          <div class="stat-label">Debt</div>
          <div class="stat-val text-danger" id="ov-debt">GH₵0</div>
        </div></div>
      </div>

      <div class="section-title">7-Day Trend</div>
      <div class="card-dark">
        <div id="weekly-bars" class="d-flex align-items-end gap-1" style="height:56px;"></div>
        <div id="weekly-labels" class="d-flex gap-1 mt-1" style="font-size:9px;color:#64748b;"></div>
      </div>

      <div class="section-title">Staff Today</div>
      <div id="ov-staff"></div>

      <div class="section-title">Top Products Today</div>
      <div id="ov-top-products"></div>

      <div class="section-title"><span style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:6px;"></span>Stock Alerts</div>
      <div id="ov-alerts"></div>

      <!-- WhatsApp -->
      <div class="section-title">Share Summary</div>
      <div class="card-dark">
        <textarea id="whatsapp-summary" readonly class="input-dark" style="height:130px;resize:none;"></textarea>
        <button class="btn-dark-primary mt-2" onclick="copySummary()"><i class="bi bi-whatsapp"></i> Copy & Share on WhatsApp</button>
      </div>
    </div>

    <!-- ── TAB: LIVE RECEIPTS ── -->
    <div id="tab-live" class="tab-content-owner">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div style="font-size:13px;"><span class="live-dot"></span> <strong>Live Receipt Feed</strong></div>
        <button class="btn-sm-dark" onclick="loadLiveReceipts()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
      </div>
      <div id="live-receipts-list"></div>
    </div>

    <!-- ── TAB: P&L ── -->
    <div id="tab-pnl" class="tab-content-owner">
      <div class="d-flex gap-2 mb-3 align-items-center">
        <input type="date" id="pnl-date" class="input-dark" style="flex:1;" onchange="loadPnl()">
        <button class="btn-sm-dark" onclick="loadPnl()"><i class="bi bi-search"></i></button>
      </div>
      <div id="pnl-content"></div>
    </div>

    <!-- ── TAB: PRICE CONTROL ── -->
    <div id="tab-prices" class="tab-content-owner">
      <div class="mb-3">
        <input type="text" id="price-search" class="input-dark" placeholder="Search product..." oninput="searchProducts()">
      </div>
      <div id="price-list"></div>
    </div>

    <!-- ── TAB: STAFF CONTROL ── -->
    <div id="tab-staff" class="tab-content-owner">
      <div class="section-title">Cashier Accounts</div>
      <div id="staff-list"></div>
    </div>

    <!-- ── TAB: ALERTS ── -->
    <div id="tab-alerts" class="tab-content-owner">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div style="font-size:13px;"><span class="live-dot"></span> <strong>Live Alerts</strong></div>
        <button class="btn-sm-dark" onclick="loadAlerts()"><i class="bi bi-arrow-clockwise"></i></button>
      </div>
      <div id="alerts-list"></div>
    </div>

    <!-- ── TAB: FINANCIAL ── -->
    <div id="tab-financial" class="tab-content-owner">
      <div class="section-title">Cash Reconciliation</div>
      <div id="cash-recon-content"></div>

      <div class="section-title">Outstanding Debts</div>
      <div id="customers-debt-list"></div>

      <div class="section-title">Staff Activity Log</div>
      <div class="d-flex gap-2 mb-2">
        <input type="date" id="activity-date" class="input-dark" style="flex:1;" onchange="loadStaffActivity()">
      </div>
      <div id="staff-activity-content"></div>
    </div>

  </div><!-- /container -->

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button onclick="switchTab('overview')" id="nav-overview" class="active">
      <i class="bi bi-speedometer2"></i><span>Overview</span>
    </button>
    <button onclick="switchTab('live')" id="nav-live">
      <i class="bi bi-receipt"></i><span>Live</span>
    </button>
    <button onclick="switchTab('alerts')" id="nav-alerts">
      <i class="bi bi-bell"></i><span>Alerts</span>
    </button>
    <button onclick="switchTab('financial')" id="nav-financial">
      <i class="bi bi-cash-coin"></i><span>Finance</span>
    </button>
    <button onclick="switchTab('pnl')" id="nav-pnl">
      <i class="bi bi-graph-up"></i><span>P&L</span>
    </button>
    <button onclick="switchTab('prices')" id="nav-prices">
      <i class="bi bi-tag"></i><span>Prices</span>
    </button>
    <button onclick="switchTab('staff')" id="nav-staff">
      <i class="bi bi-people"></i><span>Staff</span>
    </button>
  </nav>
</div>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script>
const API = 'api/owner-dashboard.php';
let currentTab = 'overview';

function fmt(n){ return 'GH₵'+parseFloat(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function fmtDate(s){ return s ? new Date(s).toLocaleString('en-GH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : ''; }
function trend(a,b){ if(!b||b==0)return ''; const p=((a-b)/b*100).toFixed(1); return p>0?`<span class="trend-up">▲${p}%</span>`:p<0?`<span class="trend-down">▼${Math.abs(p)}%</span>`:`<span class="trend-flat">=same</span>`; }

async function api(action, opts){
  const url = API + (action ? '?action='+action : '');
  const res = await fetch(url, opts||{});
  if(res.status===401){ showPin(); return null; }
  return res.json();
}

function showPin(){ document.getElementById('pin-screen').style.display='flex'; document.getElementById('app').style.display='none'; }

async function verifyPin(){
  const pin = document.getElementById('pin-input').value.trim();
  if(!pin) return;
  const d = await api('verify_pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
  if(d?.success){ document.getElementById('pin-screen').style.display='none'; document.getElementById('app').style.display='block'; loadCurrentTab(); }
  else{ document.getElementById('pin-error').textContent=d?.error||'Incorrect PIN'; document.getElementById('pin-input').value=''; }
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-content-owner').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  loadCurrentTab();
}

function loadCurrentTab(){
  if(currentTab==='overview') loadOverview();
  else if(currentTab==='live') loadLiveReceipts();
  else if(currentTab==='pnl') loadPnl();
  else if(currentTab==='prices') searchProducts();
  else if(currentTab==='staff') loadStaff();
  else if(currentTab==='alerts') loadAlerts();
  else if(currentTab==='financial') loadFinancial();
}

// ── OVERVIEW ─────────────────────────────────────────────────────
async function loadOverview(){
  const d = await api('');
  if(!d) return;
  document.getElementById('company-name-bar').textContent = d.company?.company_name||'ShelfSense';
  document.getElementById('last-updated').textContent = 'Updated '+new Date().toLocaleTimeString();
  document.getElementById('ov-revenue').textContent = fmt(d.today?.revenue);
  document.getElementById('ov-profit').textContent  = fmt(d.today?.profit);
  document.getElementById('ov-receipts').textContent= d.today?.receipts||0;
  document.getElementById('ov-margin').textContent  = (d.today?.margin||0)+'%';
  document.getElementById('ov-debt').textContent    = fmt(d.total_debt);
  document.getElementById('ov-rev-trend').innerHTML = trend(d.today?.revenue, d.yesterday?.revenue);
  document.getElementById('ov-prof-trend').innerHTML= trend(d.today?.profit, d.yesterday?.profit);

  const tr = d.weekly_trend||[], maxR = Math.max(...tr.map(t=>parseFloat(t.revenue)),1);
  document.getElementById('weekly-bars').innerHTML = tr.map(t=>{
    const h=Math.max(4,Math.round((parseFloat(t.revenue)/maxR)*52));
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;">
      <div style="width:100%;height:${h}px;background:#3b82f6;border-radius:3px 3px 0 0;"></div></div>`;
  }).join('');
  document.getElementById('weekly-labels').innerHTML = tr.map(t=>`<div style="flex:1;text-align:center;">${new Date(t.date).toLocaleDateString('en',{weekday:'short'})}</div>`).join('');

  document.getElementById('ov-staff').innerHTML = (d.staff_today||[]).length===0
    ? '<div class="list-item" style="color:#64748b;">No sales today</div>'
    : d.staff_today.map(s=>`<div class="list-item d-flex justify-content-between">
        <div><div class="name"><i class="bi bi-person-circle"></i> ${s.username}</div><div class="sub">${s.receipts} receipts</div></div>
        <div style="color:#22c55e;font-weight:700;">${fmt(s.sales)}</div></div>`).join('');

  document.getElementById('ov-top-products').innerHTML = (d.top_products||[]).length===0
    ? '<div class="list-item" style="color:#64748b;">No sales today</div>'
    : d.top_products.map((p,i)=>`<div class="list-item d-flex justify-content-between">
        <div><span style="color:#64748b;font-size:11px;">#${i+1}</span> <span class="name">${p.name}</span><div class="sub">${p.qty} units</div></div>
        <div style="color:#f59e0b;font-weight:700;">${fmt(p.revenue)}</div></div>`).join('');

  let alerts='';
  (d.out_of_stock||[]).forEach(p=>{ alerts+=`<div class="list-item d-flex justify-content-between"><span class="name">${p.name}</span><span class="badge-pill" style="background:#ef4444;color:white;">OUT</span></div>`; });
  (d.low_stock||[]).forEach(p=>{ alerts+=`<div class="list-item d-flex justify-content-between"><span class="name">${p.name}</span><span class="badge-pill" style="background:#f59e0b;color:#000;">${p.quantity} left</span></div>`; });
  document.getElementById('ov-alerts').innerHTML = alerts||'<div class="list-item" style="color:#22c55e;"><i class="bi bi-check-circle"></i> All stock OK</div>';

  const company=d.company?.company_name||'ShelfSense', now=new Date().toLocaleString('en-GH');
  document.getElementById('whatsapp-summary').value =
    `📊 *${company} — Daily Summary*\n🗓 ${now}\n\n`+
    `💰 *Revenue:* ${fmt(d.today?.revenue)}\n📈 *Profit:* ${fmt(d.today?.profit)} (${d.today?.margin||0}%)\n`+
    `🧾 *Receipts:* ${d.today?.receipts||0}\n💳 *Debt Owed:* ${fmt(d.total_debt)}\n\n`+
    (d.low_stock?.length>0?`⚠️ *Low Stock:*\n${d.low_stock.map(p=>`• ${p.name} (${p.quantity})`).join('\n')}\n\n`:'')+
    (d.out_of_stock?.length>0?`🔴 *Out of Stock:*\n${d.out_of_stock.map(p=>`• ${p.name}`).join('\n')}\n\n`:'')+
    `_Sent from ShelfSense POS_`;
}

// ── LIVE RECEIPTS ─────────────────────────────────────────────────
async function loadLiveReceipts(){
  const d = await api('live_receipts');
  if(!d) return;
  const el = document.getElementById('live-receipts-list');
  el.innerHTML = (d.items||[]).length===0
    ? '<div class="list-item" style="color:#64748b;">No receipts yet</div>'
    : d.items.map(r=>`
      <div class="list-item">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="name">${r.customer_name||'Walk-in'} <small style="color:#64748b;">#${r.invoice_number}</small></div>
            <div class="sub">${r.items||''}</div>
            <div class="sub">${fmtDate(r.created_at)} · ${r.created_by_username||''} · ${r.payment_method}</div>
          </div>
          <div style="text-align:right;">
            <div style="color:#22c55e;font-weight:700;">${fmt(r.total)}</div>
            <div style="color:#94a3b8;font-size:11px;">profit: ${fmt(r.total_profit)}</div>
            <button class="btn-dark-danger mt-1" style="padding:3px 8px;font-size:11px;" onclick="deleteReceipt(${r.id},'${r.invoice_number}')">🗑 Delete</button>
          </div>
        </div>
      </div>`).join('');
}

// ── P&L ──────────────────────────────────────────────────────────
async function loadPnl(){
  const date = document.getElementById('pnl-date').value || new Date().toISOString().split('T')[0];
  document.getElementById('pnl-date').value = date;
  const d = await api('pnl&date='+date);
  if(!d) return;
  const s = d.summary||{};
  document.getElementById('pnl-content').innerHTML = `
    <div class="row g-2 mb-3">
      <div class="col-6"><div class="card-dark"><div class="stat-label">Revenue</div><div class="stat-val text-success">${fmt(s.revenue)}</div></div></div>
      <div class="col-6"><div class="card-dark"><div class="stat-label">Profit</div><div class="stat-val text-info">${fmt(s.profit)}</div></div></div>
      <div class="col-4"><div class="card-dark text-center"><div class="stat-label">Receipts</div><div class="stat-val">${s.receipts||0}</div></div></div>
      <div class="col-4"><div class="card-dark text-center"><div class="stat-label">Margin</div><div class="stat-val text-warning">${s.margin||0}%</div></div></div>
      <div class="col-4"><div class="card-dark text-center"><div class="stat-label">Discounts</div><div class="stat-val text-danger">${fmt(s.total_discount)}</div></div></div>
    </div>
    <div class="section-title">Payment Breakdown</div>
    <div class="card-dark">
      ${[['Cash',s.cash_sales,'#22c55e'],['MoMo',s.momo_sales,'#3b82f6'],['Credit',s.credit_sales,'#ef4444'],['Card',s.card_sales,'#f59e0b']].map(([l,v,c])=>
        `<div class="d-flex justify-content-between mb-1"><span style="color:#94a3b8;">${l}</span><span style="color:${c};font-weight:700;">${fmt(v)}</span></div>`).join('')}
    </div>
    <div class="section-title">By Staff</div>
    ${(d.by_staff||[]).map(s=>`<div class="list-item d-flex justify-content-between">
      <div><div class="name">${s.username}</div><div class="sub">${s.receipts} receipts</div></div>
      <div style="text-align:right;"><div style="color:#22c55e;font-weight:700;">${fmt(s.sales)}</div><div style="color:#94a3b8;font-size:11px;">profit: ${fmt(s.profit)}</div></div>
    </div>`).join('')||'<div class="list-item" style="color:#64748b;">No sales</div>'}
    <div class="section-title">Top Products</div>
    ${(d.top_products||[]).map((p,i)=>`<div class="list-item d-flex justify-content-between">
      <div><span style="color:#64748b;">#${i+1}</span> <span class="name">${p.name}</span><div class="sub">${p.qty} units</div></div>
      <div style="color:#f59e0b;font-weight:700;">${fmt(p.revenue)}</div>
    </div>`).join('')||'<div class="list-item" style="color:#64748b;">No sales</div>'}`;
}

// ── PRICE CONTROL ─────────────────────────────────────────────────
let priceSearchTimer;
function searchProducts(){
  clearTimeout(priceSearchTimer);
  priceSearchTimer = setTimeout(async ()=>{
    const q = document.getElementById('price-search').value.trim();
    const d = await api('products&q='+encodeURIComponent(q));
    if(!d) return;
    const el = document.getElementById('price-list');
    if((d.items||[]).length===0){ el.innerHTML='<div class="list-item" style="color:#64748b;">No products found</div>'; return; }
    el.innerHTML = d.items.map(p=>{
      const units = p.units ? p.units.split('||').map(u=>{ const [id,name,price,cost]=u.split('|'); return {id,name,price,cost}; }) : [];
      return `<div class="card-dark mb-2">
        <div class="name mb-1">${p.name} <small style="color:#64748b;">${p.sku}</small></div>
        ${units.map(u=>`<div class="d-flex align-items-center gap-2 mb-1">
          <span style="color:#94a3b8;font-size:12px;flex:1;">${u.name}</span>
          <input type="number" step="0.01" value="${parseFloat(u.price).toFixed(2)}"
            id="price-${u.id}" class="input-dark" style="width:90px;padding:5px 8px;">
          <button class="btn-dark-success" onclick="updatePrice(${u.id})" style="padding:5px 10px;font-size:12px;">Save</button>
        </div>`).join('')}
      </div>`;
    }).join('');
  }, 400);
}

async function updatePrice(unitId){
  const val = parseFloat(document.getElementById('price-'+unitId).value);
  if(!val||val<=0){ alert('Enter a valid price'); return; }
  const d = await api('update_price',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({unit_id:unitId,unit_price:val})});
  if(d?.success){ const btn=document.querySelector(`button[onclick="updatePrice(${unitId})"]`); if(btn){btn.textContent='✓';btn.style.background='#16a34a';setTimeout(()=>{btn.textContent='Save';btn.style.background='';},2000);} }
  else alert('Failed to update price');
}

// ── STAFF CONTROL ─────────────────────────────────────────────────
async function loadStaff(){
  const d = await api('staff');
  if(!d) return;
  document.getElementById('staff-list').innerHTML = (d.items||[]).map(u=>{
    const active = u.status==='active';
    return `<div class="list-item d-flex justify-content-between align-items-center">
      <div>
        <div class="name"><i class="bi bi-person-circle"></i> ${u.username}
          <span class="badge-pill ms-1" style="background:${u.role==='admin'?'#7c3aed':'#334155'};color:white;">${u.role}</span>
        </div>
        <div class="sub">${active?'🟢 Active':'🔴 Disabled'}</div>
      </div>
      <button class="${active?'btn-dark-danger':'btn-dark-success'}" onclick="toggleStaff(${u.id},'${active?'inactive':'active'}',this)">
        ${active?'Disable':'Enable'}
      </button>
    </div>`;
  }).join('');
}

async function toggleStaff(userId, newStatus, btn){
  if(!confirm(`${newStatus==='inactive'?'Disable':'Enable'} this account?`)) return;
  const d = await api('toggle_staff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,status:newStatus})});
  if(d?.success) loadStaff();
  else alert(d?.error||'Failed');
}

// ── WHATSAPP ──────────────────────────────────────────────────────
function copySummary(){
  const ta = document.getElementById('whatsapp-summary');
  ta.select(); ta.setSelectionRange(0,99999);
  try{ document.execCommand('copy'); }catch(e){}
  const text = ta.value;
  window.location.href = 'whatsapp://send?text='+encodeURIComponent(text);
  setTimeout(()=>{ window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'); },1500);
}

// ── ALERTS ───────────────────────────────────────────────────────
async function loadAlerts(){
  const d = await api('alerts');
  if(!d) return;
  const el = document.getElementById('alerts-list');
  if(!d.alerts||d.alerts.length===0){
    el.innerHTML='<div class="list-item" style="color:#22c55e;"><i class="bi bi-check-circle"></i> No alerts right now</div>';
    return;
  }
  const icons = {large_sale:'💰',credit_sale:'💳',no_sale_gap:'⏰',stock_variance:'📦',overdue_debt:'⚠️',debt_paid:'✅'};
  el.innerHTML = d.alerts.map(a=>`
    <div class="list-item" style="border-left:3px solid ${a.severity==='danger'?'#ef4444':a.severity==='info'?'#22c55e':'#f59e0b'};">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <div class="name">${icons[a.type]||'🔔'} ${a.title}</div>
          <div class="sub">${a.detail}</div>
        </div>
        <span class="badge-pill" style="background:${a.severity==='danger'?'#ef4444':a.severity==='info'?'#22c55e':'#f59e0b'};color:${a.severity==='warning'?'#000':'white'};">${a.severity==='info'?'paid':a.severity}</span>
      </div>
    </div>`).join('');
}

// ── FINANCIAL ────────────────────────────────────────────────────
async function loadFinancial(){
  await Promise.all([loadCashRecon(), loadCustomersDebt(), loadStaffActivity()]);
}

async function loadCashRecon(){
  const date = new Date().toISOString().split('T')[0];
  const d = await api('cash_recon&date='+date);
  if(!d) return;
  document.getElementById('cash-recon-content').innerHTML = `
    <div class="card-dark">
      <div class="d-flex justify-content-between mb-2">
        <span style="color:#94a3b8;">Expected Cash in Till</span>
        <span style="color:#22c55e;font-weight:700;">${fmt(d.expected_cash)}</span>
      </div>
      <div class="d-flex justify-content-between mb-2">
        <span style="color:#94a3b8;">Mobile Money</span>
        <span style="color:#3b82f6;font-weight:700;">${fmt(d.momo)}</span>
      </div>
      <div class="d-flex justify-content-between mb-2">
        <span style="color:#94a3b8;">Card Payments</span>
        <span style="color:#f59e0b;font-weight:700;">${fmt(d.card)}</span>
      </div>
      <div class="d-flex justify-content-between mb-2">
        <span style="color:#94a3b8;">Credit (Owed)</span>
        <span style="color:#ef4444;font-weight:700;">${fmt(d.credit)}</span>
      </div>
      <hr style="border-color:#334155;">
      <div class="d-flex justify-content-between">
        <span style="font-weight:700;">Total Revenue</span>
        <span style="color:#22c55e;font-weight:800;font-size:16px;">${fmt(d.total_revenue)}</span>
      </div>
      <div class="sub mt-1">${d.total_receipts} receipts today</div>
    </div>`;
}

async function loadCustomersDebt(){
  const d = await api('customers');
  if(!d) return;
  const debtors = (d.items||[]).filter(c=>parseFloat(c.total_debt)>0);
  const el = document.getElementById('customers-debt-list');
  if(debtors.length===0){ el.innerHTML='<div class="list-item" style="color:#22c55e;"><i class="bi bi-check-circle"></i> No outstanding debts</div>'; return; }
  el.innerHTML = debtors.map(c=>`
    <div class="list-item">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <div><div class="name">${c.name}</div><div class="sub">${c.phone||'No phone'}</div></div>
        <div style="color:#ef4444;font-weight:700;">${fmt(c.total_debt)}</div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span style="color:#94a3b8;font-size:11px;">Credit limit:</span>
        <input type="number" step="0.01" value="${parseFloat(c.credit_limit||0).toFixed(2)}"
          id="climit-${c.id}" class="input-dark" style="width:90px;padding:4px 8px;font-size:12px;">
        <button class="btn-sm-dark" onclick="updateCreditLimit(${c.id})" style="font-size:11px;">Set</button>
      </div>
    </div>`).join('');
}

async function updateCreditLimit(cid){
  const val = parseFloat(document.getElementById('climit-'+cid).value)||0;
  const d = await api('update_credit_limit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customer_id:cid,credit_limit:val})});
  if(d?.success){ const btn=document.querySelector(`button[onclick="updateCreditLimit(${cid})"]`); if(btn){btn.textContent='✓';setTimeout(()=>btn.textContent='Set',2000);} }
}

async function loadStaffActivity(){
  const date = document.getElementById('activity-date').value || new Date().toISOString().split('T')[0];
  document.getElementById('activity-date').value = date;
  const d = await api('staff_activity&date='+date);
  if(!d) return;
  const el = document.getElementById('staff-activity-content');
  if(!d.activity||d.activity.length===0){ el.innerHTML='<div class="list-item" style="color:#64748b;">No activity on this date</div>'; return; }
  el.innerHTML = d.activity.map(a=>`
    <div class="list-item">
      <div class="name"><i class="bi bi-person-circle"></i> ${a.username}</div>
      <div class="sub">First sale: ${a.first_sale ? new Date(a.first_sale).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}) : '—'}</div>
      <div class="sub">Last sale: ${a.last_sale ? new Date(a.last_sale).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}) : '—'}</div>
      <div class="d-flex gap-3 mt-1">
        <span style="color:#3b82f6;font-size:12px;">${a.receipts} receipts</span>
        <span style="color:#22c55e;font-size:12px;">${fmt(a.total_sales)}</span>
      </div>
    </div>`).join('');
}

// ── DELETE RECEIPT ────────────────────────────────────────────────
async function deleteReceipt(rid, invoice){
  if(!confirm('Delete receipt '+invoice+'? This cannot be undone.')) return;
  const d = await api('delete_receipt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({receipt_id:rid})});
  if(d?.success) loadLiveReceipts();
  else alert(d?.error||'Failed');
}

document.getElementById('pnl-date').value = new Date().toISOString().split('T')[0];
document.getElementById('activity-date').value = new Date().toISOString().split('T')[0];
setInterval(()=>{ if(document.getElementById('app').style.display!=='none') loadCurrentTab(); },120000);
</script>
